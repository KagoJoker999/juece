<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>初始化Supabase数据库</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background: #f5f5f5;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 30px;
        }

        .status {
            padding: 15px;
            border-radius: 5px;
            margin: 20px 0;
            font-weight: 500;
        }

        .status.checking {
            background: #e3f2fd;
            color: #1976d2;
            border: 1px solid #bbdefb;
        }

        .status.success {
            background: #e8f5e8;
            color: #2e7d32;
            border: 1px solid #c8e6c9;
        }

        .status.error {
            background: #ffebee;
            color: #c62828;
            border: 1px solid #ffcdd2;
        }

        .init-button {
            width: 100%;
            padding: 15px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .init-button:hover {
            background: #45a049;
        }

        .init-button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .instructions {
            background: #fff3e0;
            border: 1px solid #ffcc02;
            padding: 20px;
            border-radius: 5px;
            margin: 20px 0;
        }

        .instructions h3 {
            margin-top: 0;
            color: #f57c00;
        }

        .sql-code {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 3px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            overflow-x: auto;
            white-space: pre-wrap;
            margin: 15px 0;
        }

        .back-button {
            display: inline-block;
            padding: 10px 20px;
            background: #2196F3;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            margin-top: 20px;
        }

        .back-button:hover {
            background: #1976D2;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🔧 Supabase数据库初始化</h1>

        <div id="status" class="status checking">
            正在检查数据库连接...
        </div>

        <div id="instructions" class="instructions" style="display: none;">
            <h3>📋 手动初始化步骤：</h3>
            <p>如果自动初始化失败，请按以下步骤操作：</p>
            <ol>
                <li>打开您的Supabase项目面板</li>
                <li>进入 <strong>SQL Editor</strong></li>
                <li>复制以下SQL代码并执行：</li>
            </ol>
            <div class="sql-code" id="sqlCode"></div>
            <p>执行完成后，点击刷新按钮或返回主页。</p>
            <a href="index.html" class="back-button">返回主页</a>
        </div>

        <button id="initButton" class="init-button" onclick="initializeDatabase()" style="display: none;">
            🚀 开始初始化数据库
        </button>

        <div id="result" style="display: none; margin-top: 20px;"></div>
    </div>

    <script>
        // Supabase配置
        const SUPABASE_URL = 'https://ugadhdhwixrejzfcwugj.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVnYWRoZGh3aXhyZWp6ZmN3dWdqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjYyMzU3NTgsImV4cCI6MjA4MTgxMTc1OH0.XQp5pvoM-nSGfLZB9ZGfxJCkU3GbeiWrBohA_XchS54';

        // SQL创建语句
        const CREATE_TABLE_SQL = `CREATE TABLE IF NOT EXISTS express_compensation_records (
    id BIGSERIAL PRIMARY KEY,
    tracking_number VARCHAR(255) NOT NULL,
    amount DECIMAL(10,2) NOT NULL,
    record_type VARCHAR(50) NOT NULL CHECK (record_type IN ('compensation', 'advance')),
    is_paid BOOLEAN DEFAULT FALSE,
    record_date DATE NOT NULL,
    note TEXT,
    created_at TIMESTAMP WITH TIME ZONE DEFAULT NOW(),
    updated_at TIMESTAMP WITH TIME ZONE DEFAULT NOW()
);

-- 创建索引
CREATE INDEX IF NOT EXISTS idx_express_compensation_records_date ON express_compensation_records(record_date);
CREATE INDEX IF NOT EXISTS idx_express_compensation_records_tracking_number ON express_compensation_records(tracking_number);
CREATE INDEX IF NOT EXISTS idx_express_compensation_records_type ON express_compensation_records(record_type);
CREATE INDEX IF NOT EXISTS idx_express_compensation_records_is_paid ON express_compensation_records(is_paid);

-- 启用RLS
ALTER TABLE express_compensation_records ENABLE ROW LEVEL SECURITY;

-- 创建RLS策略
CREATE POLICY "Allow public read access" ON express_compensation_records FOR SELECT USING (true);
CREATE POLICY "Allow public insert access" ON express_compensation_records FOR INSERT WITH CHECK (true);
CREATE POLICY "Allow public update access" ON express_compensation_records FOR UPDATE USING (true);
CREATE POLICY "Allow public delete access" ON express_compensation_records FOR DELETE USING (true);`;

        // 设置SQL代码显示
        document.getElementById('sqlCode').textContent = CREATE_TABLE_SQL;

        // 检查数据库状态
        async function checkDatabaseStatus() {
            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/express_compensation_records?limit=1`, {
                    method: 'GET',
                    headers: {
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (response.ok) {
                    showSuccess('✅ 数据库已存在且连接正常！');
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 2000);
                } else if (response.status === 404) {
                    showError('⚠️ 数据库表不存在，需要初始化');
                    showManualInstructions();
                } else {
                    throw new Error(`HTTP ${response.status}`);
                }
            } catch (error) {
                showError(`❌ 数据库连接失败: ${error.message}`);
                showManualInstructions();
            }
        }

        // 显示成功状态
        function showSuccess(message) {
            const status = document.getElementById('status');
            status.className = 'status success';
            status.textContent = message;
            document.getElementById('initButton').style.display = 'none';
        }

        // 显示错误状态
        function showError(message) {
            const status = document.getElementById('status');
            status.className = 'status error';
            status.textContent = message;
            document.getElementById('initButton').style.display = 'block';
        }

        // 显示手动说明
        function showManualInstructions() {
            document.getElementById('instructions').style.display = 'block';
        }

        // 初始化数据库（尝试创建测试记录来触发表创建）
        async function initializeDatabase() {
            const button = document.getElementById('initButton');
            const status = document.getElementById('status');

            button.disabled = true;
            button.textContent = '🔄 正在初始化...';
            status.className = 'status checking';
            status.textContent = '正在尝试初始化数据库...';

            try {
                // 获取北京时间 (UTC+8)
                const now = new Date();
                const beijingTime = new Date(now.getTime() + 8 * 60 * 60 * 1000);

                // 尝试插入一条记录，这会触发表创建的提示
                const response = await fetch(`${SUPABASE_URL}/rest/v1/express_compensation_records`, {
                    method: 'POST',
                    headers: {
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                        'Content-Type': 'application/json',
                        'Prefer': 'return=minimal'
                    },
                    body: JSON.stringify({
                        tracking_number: 'INIT_TEST',
                        amount: 0.01,
                        record_type: 'compensation',
                        is_paid: false,
                        record_date: beijingTime.toISOString().split('T')[0],
                        note: '初始化测试记录'
                    })
                });

                if (response.ok) {
                    showSuccess('✅ 数据库初始化成功！');
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 2000);
                } else {
                    const errorData = await response.json();
                    throw new Error(errorData.message || '未知错误');
                }
            } catch (error) {
                showError(`❌ 初始化失败: ${error.message}`);
                showManualInstructions();
            } finally {
                button.disabled = false;
                button.textContent = '🚀 开始初始化数据库';
            }
        }

        // 页面加载时检查状态
        window.addEventListener('load', checkDatabaseStatus);
    </script>
</body>

</html>
